<!DOCTYPE html>
<html>
<head>
    <title>CHESS MAX: AI + DETECTOR</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        :root { --bg: #121212; --panel: #1e1e1e; --white-gold: #f1c40f; --alert: #e74c3c; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 10px; }
        
        .container { display: flex; gap: 20px; align-items: flex-start; margin-top: 10px; }
        #board { width: 450px; border: 4px solid #333; border-radius: 5px; box-shadow: 0 0 40px rgba(0,0,0,0.8); }
        
        .side-panel { width: 300px; background: var(--panel); padding: 20px; border-radius: 8px; border: 1px solid #444; }
        
        /* The Status Message Box */
        .status-box { padding: 15px; border-radius: 5px; text-align: center; font-weight: bold; margin-bottom: 15px; font-size: 1.2rem; }
        .active-turn { background: #27ae60; color: white; }
        .game-over { background: var(--alert); color: white; animation: shake 0.5s; }

        #history { height: 180px; overflow-y: auto; background: #000; padding: 10px; border-radius: 4px; font-family: monospace; color: #aaa; margin-bottom: 15px; border: 1px solid #333; }
        
        button { width: 100%; padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 8px; transition: 0.2s; }
        .undo-btn { background: #3498db; color: white; }
        .reset-btn { background: #555; color: white; }
        button:hover { filter: brightness(1.2); }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(5px); }
            50% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <h2 style="letter-spacing: 2px;">CHESS <span style="color:var(--white-gold)">MAX</span> ENGINE</h2>

    <div class="container">
        <div id="board"></div>

        <div class="side-panel">
            <div id="status" class="status-box active-turn">YOUR TURN</div>
            
            <div id="history">Moves will appear here...</div>

            <button class="undo-btn" onclick="undo()">Undo</button>
            <button class="reset-btn" onclick="reset()">New Game</button>
            
            <div style="font-size: 0.75rem; color: #777; margin-top: 10px;">
                <b>Detection Active:</b> Checkmate, Stalemate, Draw, 3-Fold Repetition.
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();
        var $status = $('#status');
        var $history = $('#history');

        function onDragStart (source, piece, position, orientation) {
            if (game.game_over()) return false;
            // Human is White
            if (piece.search(/^b/) !== -1) return false;
        }

        function onDrop (source, target) {
            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';

            updateStatus();
            // AI moves after 400ms
            window.setTimeout(makeBestMove, 400);
        }

        function makeBestMove() {
            var moves = game.moves();
            if (moves.length === 0) return;

            // Simple "Smart" AI: Prioritize captures
            var captureMoves = moves.filter(m => m.includes('x'));
            var chosenMove = captureMoves.length > 0 
                ? captureMoves[Math.floor(Math.random() * captureMoves.length)]
                : moves[Math.floor(Math.random() * moves.length)];

            game.move(chosenMove);
            board.position(game.fen());
            updateStatus();
        }

        function updateStatus() {
            var statusText = "";
            var moveColor = game.turn() === 'b' ? 'Black' : 'White';

            // 1. CHECKMATE DETECTOR
            if (game.in_checkmate()) {
                statusText = "CHECKMATE! " + (game.turn() === 'w' ? 'AI Wins' : 'You Win');
                $status.addClass('game-over');
            } 
            // 2. STALEMATE DETECTOR
            else if (game.in_stalemate()) {
                statusText = "GAME OVER: STALEMATE";
                $status.addClass('game-over');
            }
            // 3. DRAW DETECTOR (Repetition / 50-move)
            else if (game.in_draw()) {
                statusText = "GAME OVER: DRAW";
                $status.addClass('game-over');
            }
            // 4. CHECK DETECTOR
            else {
                statusText = game.turn() === 'w' ? "YOUR TURN" : "AI THINKING...";
                if (game.in_check()) {
                    statusText += " (CHECK!)";
                }
                $status.removeClass('game-over');
            }

            $status.html(statusText);
            
            // Log Moves
            var history = game.history();
            $history.html(history.map((m, i) => `<div>${i+1}. ${m}</div>`).join(''));
            $history.scrollTop($history[0].scrollHeight);
        }

        function undo() {
            game.undo(); game.undo(); // Back to player's turn
            board.position(game.fen());
            updateStatus();
        }

        function reset() {
            game.reset();
            board.start();
            updateStatus();
        }

        function onSnapEnd () { board.position(game.fen()); }

        board = Chessboard('board', {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd
        });

        updateStatus();
    </script>
</body>
</html>
