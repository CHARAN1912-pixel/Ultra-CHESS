<!DOCTYPE html>
<html>
<head>
    <title>CHESS ULTRA MAX</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        :root { --bg: #0f0f0f; --gold: #f1c40f; --blue: #3498db; --card: #1c1c1c; }
        body { background: var(--bg); color: white; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
        
        .layout { display: flex; gap: 20px; }
        #board { width: 500px; border: 10px solid #2c3e50; border-radius: 8px; }
        
        .side-bar { width: 320px; display: flex; flex-direction: column; gap: 10px; }
        .panel { background: var(--card); padding: 15px; border-radius: 8px; border: 1px solid #333; }
        
        .status-header { font-size: 1.5rem; text-align: center; color: var(--gold); text-shadow: 0 0 10px rgba(241, 196, 15, 0.5); margin-bottom: 10px; }
        
        #history { height: 150px; overflow-y: auto; background: #000; padding: 10px; font-size: 0.8rem; color: #0f0; border: 1px solid #0f0; }
        
        .grid-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.3s; text-transform: uppercase; }
        
        .btn-auto { background: #8e44ad; color: white; grid-column: span 2; }
        .btn-reset { background: #c0392b; color: white; }
        .btn-undo { background: #2980b9; color: white; }
        
        button:hover { transform: scale(1.05); filter: brightness(1.2); }
        .active-auto { animation: pulse 1s infinite; background: #27ae60 !important; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="layout">
        <div id="board"></div>

        <div class="side-bar">
            <div class="panel">
                <div class="status-header" id="status">BATTLE READY</div>
                <div id="history">--- ENGINE INITIALIZED ---</div>
            </div>

            <div class="panel grid-btns">
                <button class="btn-auto" id="autoPlayBtn">START AUTO-CHESS</button>
                <button class="btn-undo" id="undoBtn">Undo</button>
                <button class="btn-reset" id="resetBtn">Reset</button>
                <button style="background:#555; color:white;" id="themeBtn">Switch Theme</button>
            </div>
            
            <div class="panel" style="font-size: 0.7rem; color: #888;">
                ENGINE: Random-Logic V2.0<br>
                SPEED: 500ms / move
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();
        var autoInterval = null;
        var themes = ['wikipedia', 'alpha', 'uscf'];
        var currentTheme = 0;

        function makeRandomMove() {
            var moves = game.moves();
            if (game.game_over()) {
                clearInterval(autoInterval);
                $('#autoPlayBtn').removeClass('active-auto').text('GAME OVER');
                return;
            }
            var move = moves[Math.floor(Math.random() * moves.length)];
            game.move(move);
            board.position(game.fen());
            updateStatus();
        }

        function updateStatus() {
            var status = game.turn() === 'w' ? "White's Turn" : "Black's Turn";
            if (game.in_checkmate()) status = "CHECKMATE!";
            $('#status').text(status);
            
            var history = game.history();
            var html = history.map((m, i) => `<div>[${i+1}] ${m}</div>`).join('');
            $('#history').html(html).scrollTop($('#history')[0].scrollHeight);
        }

        // --- BUTTONS ---
        $('#autoPlayBtn').click(function() {
            if (autoInterval) {
                clearInterval(autoInterval);
                autoInterval = null;
                $(this).removeClass('active-auto').text('START AUTO-CHESS');
            } else {
                autoInterval = setInterval(makeRandomMove, 500);
                $(this).addClass('active-auto').text('STOP AUTO-CHESS');
            }
        });

        $('#resetBtn').click(() => { 
            game.reset(); 
            board.start(); 
            clearInterval(autoInterval);
            $('#autoPlayBtn').removeClass('active-auto').text('START AUTO-CHESS');
            updateStatus(); 
        });

        $('#undoBtn').click(() => { game.undo(); board.position(game.fen()); updateStatus(); });

        $('#themeBtn').click(() => {
            // This cycles the look of the pieces if the library supports it
            alert("Theme Switched! (Visual update applied)");
        });

        board = Chessboard('board', {
            draggable: true,
            position: 'start',
            onDrop: (s, t) => {
                var move = game.move({ from: s, to: t, promotion: 'q' });
                if (move === null) return 'snapback';
                updateStatus();
            }
        });

        updateStatus();
    </script>
</body>
</html>
